name: BIST CE Puanli Sinyal

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 1-5'

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install yfinance pandas numpy

      - name: Taramayı çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bist_ce_puanli.py

      - name: Durum dosyasını kaydet
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add bist_ce_puanli_state.json
          git diff --staged --quiet || git commit -m "Durum güncellendi"
          git push || (git pull --rebase origin main && git push)
