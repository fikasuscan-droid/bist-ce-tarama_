name: Pay Vadeli UT Bot Taraması
on:
  schedule:
    - cron: '*/15 6-15 * * 1-5'
  workflow_dispatch:
jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kütüphaneleri yükle
        run: pip install borsapy pandas numpy
      - name: Taramayı çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python viop_ut_bot_tarama.py
      - name: Durum dosyasını kaydet
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add viop_ut_state.json
          git diff --staged --quiet || git commit -m "Durum güncellendi"
          git push || (git pull --rebase origin main && git push)
